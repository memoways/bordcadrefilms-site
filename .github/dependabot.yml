version: 2
updates:
  # Keep GitHub Actions pinned versions up to date
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore(ci)"
    labels:
      - dependencies

  # Keep npm dependencies up to date (limit to avoid PR flood)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore(deps)"
    labels:
      - dependencies
    open-pull-requests-limit: 5
    # Group minor + patch updates to reduce noise
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
