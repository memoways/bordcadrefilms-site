name: Bug report
description: Something is broken
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly — what you expected vs what occurred.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Production (bordcadrefilms.com)
        - Staging
        - Local dev
    validations:
      required: true

  - type: input
    id: notion
    attributes:
      label: Notion task (optional)
      placeholder: https://www.notion.so/...
